version: "3.9"

services:

  # ── API de predicción ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sena_desercion_api
    ports:
      - "8000:8000"
    environment:
      CLF_MODEL_PATH: /app/models/mejor_clasificador.pkl
      REG_MODEL_PATH: /app/models/mejor_regresor.pkl
    volumes:
      # Montar carpeta de modelos en tiempo de ejecución
      # (permite actualizar modelos sin reconstruir la imagen)
      - ./api/models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      mlflow:
        condition: service_healthy

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    container_name: sena_mlflow
    working_dir: /mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      sh -c "pip install mlflow==2.14.1 --quiet &&
             mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns
               --default-artifact-root /mlflow/mlruns"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  default:
    name: sena_desercion_net
